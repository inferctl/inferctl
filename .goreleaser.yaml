version: 2

project_name: inferctl

before:
  hooks:
    - go mod download

builds:
  - id: inferctl
    main: ./cmd/inferctl
    binary: inferctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.toolVersion={{.Version}}
      - -X main.buildCommit={{.Commit}}
      - -X main.buildDate={{.Date}}

archives:
  - id: inferctl
    ids:
      - inferctl
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - CHANGELOG.md
      - LICENSE_PENDING.md
      - docs/install.md
      - docs/agent-guide.md
      - docs/verbs.md
      - docs/errors.md
      - testdata/contract/README.md

scoops:
  - name: inferctl
    ids:
      - inferctl
    repository:
      owner: Ozhiaki
      name: scoop-bucket
    directory: bucket
    homepage: https://github.com/Ozhiaki/inferctl
    description: Agent-oriented CLI for inspecting local inference backends and routing decisions.
    license: LicenseRef-Proprietary
    url_template: "https://github.com/Ozhiaki/inferctl/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    skip_upload: true
    post_install:
      - Write-Host "inferctl installs the 'inferctl' command. Run 'inferctl version --json' to verify it is on PATH."

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  disable: true

release:
  disable: true
