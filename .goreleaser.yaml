version: 2

project_name: inferctl

before:
  hooks:
    - go mod download

builds:
  - id: inferctl
    main: ./cmd/inferctl
    binary: inferctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.toolVersion={{.Version}}
      - -X github.com/Ozhiaki/inferctl/internal/version.version={{.Version}}
      - -X github.com/Ozhiaki/inferctl/internal/version.commit={{.Commit}}
      - -X github.com/Ozhiaki/inferctl/internal/version.date={{.Date}}

archives:
  - id: inferctl
    ids:
      - inferctl
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - CHANGELOG.md
      - LICENSE_PENDING.md
      - docs/install.md
      - docs/agent-guide.md
      - docs/verbs.md
      - docs/errors.md
      - testdata/contract/README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  disable: true

release:
  disable: true
