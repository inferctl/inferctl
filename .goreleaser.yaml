version: 2

project_name: inferctl

before:
  hooks:
    - go mod download

builds:
  - id: infer
    main: ./cmd/infer
    binary: infer
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.buildCommit={{.Commit}}
      - -X main.buildDate={{.Date}}

archives:
  - id: infer
    ids:
      - infer
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - CHANGELOG.md
      - LICENSE_PENDING.md
      - testdata/contract/README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  disable: true

release:
  disable: true
