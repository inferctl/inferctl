constraints:
  - Build only repo-deliverable v0.1 implementation work under /Users/dave/p/inferctl/inferctl.
  - Exclude Guideboard outreach, lawyer review, name availability sweep, public visibility changes, and public release actions; those are user-owned gates.
  - Implement from the finalized v0.1 spec docs in /Users/dave/p/inferctl/v0.1 and the embedded skills/make-cli/SKILL.md.
