constraints:
  - Later phases may start in parallel, but a phase cannot be declared done until every named dependency phase has green acceptance.
  - Keep the v0.2 contract additive and preserve `contract_version = "0.1"` unless an explicit contract decision changes it.
  - Capabilities must remain the index for every shipped verb, schema, code, backend kind, and guide reference.
  - Preserve v0.1 verb-shape compatibility throughout v0.2 work.
  - Redact auth and secret-looking values from JSON, logs, diffs, goldens, warnings, and errors.
  - Path-bearing contract goldens must be deterministic across POSIX and Windows.
  - Triage must not invoke discovery inline in v0.2; it may consume caller-provided prior JSON envelopes.
  - Discovery must use fixed localhost port scanning only; do not use process-table or subnet scanning.
  - Remote backend endpoints require explicit opt-in.
  - Windows CI, config write correctness, recommendation hygiene, deterministic TRIAGE ranking, `docs/agent-guide.md`, and openai_compat auth/remote support are not cuttable without explicit re-scope.
preferences:
  - When v0.2 slips, cut stretch backends first, then nonessential `--deliver` targets beyond `file:<path>`, then packaged demo examples if source examples still pass.
  - Store per-phase implementation details in child issue design fields and keep this epic context focused on cross-cutting release constraints.
